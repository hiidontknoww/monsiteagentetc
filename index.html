<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>@vladimirmoulu</title>
  <meta name="description" content="Vladimir Moulu — Mannequin" />
  <meta property="og:title" content="@vladimirmoulu" />
  <meta property="og:description" content="Mannequin" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
      --muted: #8a8a8a;
      --card: rgba(255, 255, 255, 0.04);
      --card-hover: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100%;
      display: flex;
      justify-content: center;
      padding: 56px 22px calc(40px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade 0.7s ease both;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Photo de profil — rond blanc.
       Pour ta vraie photo : remplace <div class="avatar"> par
       <img class="avatar" src="photo.jpg" alt="Vladimir Moulu" /> */
    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: #ffffff;
      object-fit: cover;
      display: block;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 8px 30px rgba(255,255,255,0.06);
    }

    .name {
      margin-top: 20px;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .verified { width: 19px; height: 19px; flex: 0 0 auto; }

    .tagline {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
    }

    .links {
      width: 100%;
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--fg);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .link:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.22); transform: translateY(-2px); }
    .link:active { transform: translateY(0) scale(0.99); }

    .link .icon { flex: 0 0 auto; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .link .icon svg { width: 22px; height: 22px; }

    .link .text { display: flex; flex-direction: column; line-height: 1.25; }
    .link .text .label { font-weight: 600; }
    .link .text .sub { font-size: 12.5px; color: var(--muted); font-weight: 400; margin-top: 2px; }

    .link .arrow { margin-left: auto; color: var(--muted); transition: transform 0.2s ease; }
    .link:hover .arrow { transform: translateX(3px); color: var(--fg); }
  </style>
</head>
<body>
  <main class="container">
    <!-- Pour mettre ta vraie photo : remplace le bloc ci-dessous par
         <img class="avatar" src="photo.jpg" alt="Vladimir Moulu" /> -->
    <div class="avatar" role="img" aria-label="Vladimir Moulu"></div>

    <h1 class="name">@vladimirmoulu</h1>
    <p class="tagline">Mannequin</p>

    <nav class="links">
      <a class="link" href="https://instagram.com/16parismanagement" target="_blank" rel="noopener">
        <span class="icon">

            <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/>
          </svg>
        </span>
        <span class="text">
          <span class="label">@16parismanagement</span>
          <span class="sub">Agence</span>
        </span>
        <span class="arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>

      <a class="link" href="https://instagram.com/lesnouveauxperesfondateurs" target="_blank" rel="noopener">

          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/>
          </svg>
        </span>
        <span class="text">
          <span class="label">@lesnouveauxperesfondateurs</span>
        </span>
        <span class="arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

  <!-- ============================================================
       NOTIFICATION TELEGRAM À CHAQUE VISITE
       -> Remplace les 2 valeurs ci-dessous (voir les étapes que je t'ai données)
       ============================================================ -->
  <script>
  (function () {
    var BOT_TOKEN = "8836935224:AAERF_lgzSr9IAyK0_VwrAcpC4vOxCxg8vA";
    var CHAT_ID   = "8215550381";

    if (BOT_TOKEN.indexOf("COLLE_") === 0 || CHAT_ID.indexOf("COLLE_") === 0) return;

    function deviceInfo() {
      var ua = navigator.userAgent;
      var os = "Ordinateur";
      if (/iPhone/i.test(ua)) os = "iPhone";
      else if (/iPad/i.test(ua)) os = "iPad";
      else if (/Android/i.test(ua)) os = "Android";
      else if (/Windows/i.test(ua)) os = "Windows";
      else if (/Mac OS X/i.test(ua)) os = "Mac";
      var br = "Navigateur";
      if (/Instagram/i.test(ua)) br = "App Instagram";
      else if (/FBAN|FBAV/i.test(ua)) br = "App Facebook";
      else if (/TikTok|musical_ly/i.test(ua)) br = "App TikTok";
      else if (/Snapchat/i.test(ua)) br = "App Snapchat";
      else if (/Edg/i.test(ua)) br = "Edge";
      else if (/CriOS|Chrome/i.test(ua)) br = "Chrome";
      else if (/FxiOS|Firefox/i.test(ua)) br = "Firefox";
      else if (/Version\/.*Safari/i.test(ua)) br = "Safari";
      return os + " · " + br;
    }

    function source() {
      var ua = navigator.userAgent;
      if (/Instagram/i.test(ua)) return "Instagram";
      if (/TikTok|musical_ly/i.test(ua)) return "TikTok";
      if (/Snapchat/i.test(ua)) return "Snapchat";
      var r = document.referrer;
      if (!r) return "Direct / inconnu";
      try { return new URL(r).hostname.replace(/^www\./, ""); } catch (e) { return r; }
    }

    function send(geo) {
      var now = new Date().toLocaleString("fr-FR", { dateStyle: "long", timeStyle: "short" });
      var loc = "Inconnue";
      if (geo && geo.success !== false && geo.city) {
        loc = [geo.city, geo.region, geo.country].filter(Boolean).join(", ");
        if (geo.flag && geo.flag.emoji) loc += " " + geo.flag.emoji;
      }
      var lines = [
        "👁 <b>Nouvelle visite — vladimirmoulu</b>",
        "🕒 " + now,
        "📍 " + loc,
        "📱 " + deviceInfo(),
        "↩️ Source : " + source(),
        "🌐 Langue : " + (navigator.language || "?")
      ];
      if (geo && geo.ip) lines.push("🔢 IP : " + geo.ip);

      fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: lines.join("\n"),
          parse_mode: "HTML",
          disable_web_page_preview: true
        })
      }).catch(function () {});
    }

    fetch("https://ipwho.is/")
      .then(function (r) { return r.json(); })
      .then(send)
      .catch(function () { send(null); });
  })();
  </script>
</body>
</html>
