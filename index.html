<title>vlad (@vladimirmoulu)</title>
<style>
  *{
    margin:0;padding:0;box-sizing:border-box;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  img{
    -webkit-user-drag:none;user-drag:none;
    pointer-events:none;
  }
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#fff;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px 16px;
    position:relative;
  }
  @keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
  }
  @keyframes spin3d{
    from{transform:perspective(420px) rotateY(0deg)}
    to{transform:perspective(420px) rotateY(360deg)}
  }
  /* panneau image + noir, regroupé, arrondi, qui flotte */
  .wrap{
    width:100%;
    max-width:566px;
    display:flex;
    flex-direction:column;
    align-items:center;
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 22px 60px rgba(0,0,0,.65);
    animation:float 5s ease-in-out infinite;
  }
  /* prolongement noir sous la photo, coins arrondis via le panneau */
  .below{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 18px 26px;
    background:#000;
  }
  /* la photo : taille de base 566 x 546 (ratio 283:273) */
  .photo{
    position:relative;
    width:100%;
    max-width:566px;
    aspect-ratio:283/273;
    overflow:hidden;
    display:block;
  }
  .photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  /* fondu fumée : le bas de l'image se dissout dans le noir, sans trait */
  .photo::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:-1px;
    height:50%;
    background:linear-gradient(to top,
      #000 0%,
      rgba(0,0,0,.92) 14%,
      rgba(0,0,0,.5) 34%,
      rgba(0,0,0,0) 100%);
    pointer-events:none;
  }
  /* nom + Mannequin posés sur l'image */
  .pname{
    position:absolute;
    left:0;right:0;bottom:18px;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  /* nom centré ; la certif est en absolu pour ne pas décaler "vlad" */
  .name{
    position:relative;
    display:inline-flex;
    align-items:center;
    font-size:30px;
    font-weight:750;
    letter-spacing:.2px;
    text-shadow:0 2px 14px rgba(0,0,0,.85);
  }
  .name svg{
    position:absolute;
    left:calc(100% + 8px);
    top:0;bottom:0;
    margin:auto 0;
    width:24px;height:24px;
    animation:spin3d 2.6s linear infinite;
    filter:drop-shadow(0 0 5px rgba(80,170,255,.9));
  }
  .sub{
    margin-top:4px;
    font-size:14px;
    font-weight:400;
    color:#e7e9ec;
    text-shadow:0 1px 10px rgba(0,0,0,.8);
  }
  /* les 4 rectangles */
  .links{
    width:100%;
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .card{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:14px 18px;
    border-radius:14px;
    background:transparent;
    border:1px solid rgba(255,255,255,.45);
    text-decoration:none;
    color:#fff;
    font-size:15px;
    font-weight:500;
    transition:background .15s ease, transform .15s ease;
  }
  .card:hover{background:rgba(255,255,255,.08);transform:translateY(-1px)}
  .card .ic{width:26px;height:26px;flex:0 0 auto;display:inline-flex}
  .card .ic svg{width:100%;height:100%}
</style>
</head>

<script>
  // bloquer clic droit, glisser, sélection, et raccourcis de sauvegarde/inspection
  ['contextmenu','dragstart','selectstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
  });
  document.addEventListener('keydown', function(e){
    var k = (e.key||'').toLowerCase();
    if (k === 'f12') { e.preventDefault(); return; }
    if (e.ctrlKey && e.shiftKey && ['i','j','c'].indexOf(k) !== -1) { e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && ['s','u','p','a'].indexOf(k) !== -1) { e.preventDefault(); }
  });
</script>
