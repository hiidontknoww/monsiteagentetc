<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="msapplication-navbutton-color" content="#000000">
<meta name="color-scheme" content="dark">

<title>vlad (@vladimirmoulu)</title>
<style>
  *{
    margin:0;padding:0;box-sizing:border-box;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  img{
    -webkit-user-drag:none;user-drag:none;
    pointer-events:none;
  }
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:#000}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#fff;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:max(16px, calc(env(safe-area-inset-top) + 10px)) 0 0;
    position:relative;
  }
  /* panneau image + noir, regroupé, arrondi */
  .wrap{
    width:100%;
    max-width:570px;
    display:flex;
    flex-direction:column;
    align-items:center;
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 22px 60px rgba(0,0,0,.65);
  }
  /* prolongement noir sous la photo, coins arrondis via le panneau */
  .below{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 10px 26px;
    background:#000;
  }
  /* la photo : taille de base 566 x 546 (ratio 283:273) */
  .photo{
    position:relative;
    width:100%;
    max-width:570px;
    aspect-ratio:1/1;
    overflow:hidden;
    display:block;
  }
  .photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    display:block;
  }
  /* fondu fumée en haut : pas de coupe nette, on ne voit pas la délimitation */
  .photo::before{
    content:"";
    position:absolute;
    left:0;right:0;top:-1px;
    height:24%;
    background:linear-gradient(to bottom,
      rgba(0,0,0,.82) 0%,
      rgba(0,0,0,.38) 38%,
      rgba(0,0,0,0) 100%);
    pointer-events:none;
    z-index:1;
  }
  /* vraie fumée animée (texture de bruit qui dérive) par-dessus le haut */
  .smoke{
    position:absolute;
    top:-2px;left:0;right:0;
    height:70%;
    z-index:1;
    pointer-events:none;
    overflow:hidden;
    filter:blur(3px);
    -webkit-mask:linear-gradient(to bottom,#000 0%,#000 34%,transparent 100%);
    mask:linear-gradient(to bottom,#000 0%,#000 34%,transparent 100%);
  }
  /* 2 couches de bruit tuilé qui dérivent en continu (boucle seamless, jamais d'arrêt) */
  .smoke::before,.smoke::after{
    content:"";
    position:absolute;
    top:0;left:0;
    width:300%;height:300%;
    background-repeat:repeat;
    will-change:transform;
  }
  .smoke::before{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='320'%20height='320'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.011%200.018'%20numOctaves='3'%20seed='11'%20stitchTiles='stitch'/%3E%3CfeColorMatrix%20type='matrix'%20values='0%200%200%200%200%200%200%200%200%200%200%200%200%200%200%201.4%200%200%200%20-0.12'/%3E%3C/filter%3E%3Crect%20width='320'%20height='320'%20filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:33.333% 33.333%;
    opacity:.95;
    animation:smokeA 26s linear infinite;
  }
  .smoke::after{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='340'%20height='340'%3E%3Cfilter%20id='m'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.009%200.015'%20numOctaves='3'%20seed='4'%20stitchTiles='stitch'/%3E%3CfeColorMatrix%20type='matrix'%20values='0%200%200%200%200%200%200%200%200%200%200%200%200%200%200%201.3%200%200%200%20-0.18'/%3E%3C/filter%3E%3Crect%20width='340'%20height='340'%20filter='url(%23m)'/%3E%3C/svg%3E");
    background-size:25% 25%;
    opacity:.6;
    animation:smokeB 40s linear infinite;
  }
  @keyframes smokeA{
    from{transform:translate3d(0,0,0)}
    to  {transform:translate3d(-33.333%,-33.333%,0)}
  }
  @keyframes smokeB{
    from{transform:translate3d(0,0,0)}
    to  {transform:translate3d(-50%,-25%,0)}
  }
  /* fondu fumée : le bas de l'image se dissout dans le noir, sans trait */
  .photo::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:-1px;
    height:50%;
    background:linear-gradient(to top,
      #000 0%,
      rgba(0,0,0,.92) 14%,
      rgba(0,0,0,.5) 34%,
      rgba(0,0,0,0) 100%);
    pointer-events:none;
  }
  /* nom + Mannequin posés sur l'image */
  .pname{
    position:absolute;
    left:0;right:0;bottom:18px;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  /* nom centré ; la certif est en absolu pour ne pas décaler "vlad" */
  .name{
    position:relative;
    display:inline-flex;
    align-items:center;
    font-size:23px;
    font-weight:600;
    letter-spacing:.4px;
    text-shadow:0 2px 16px rgba(0,0,0,.85);
  }
  .name svg{
    position:absolute;
    left:calc(100% + 7px);
    top:0;bottom:0;
    margin:auto 0;
    width:17px;height:17px;
    transform:translateY(2px);
    animation:certPulse 1.8s ease-in-out infinite;
  }
  @keyframes certPulse{
    0%,100%{ filter:drop-shadow(0 0 2px rgba(0,170,255,.55)); }
    50%    { filter:drop-shadow(0 0 7px rgba(0,200,255,.95)); }
  }
  .sub{
    margin-top:3px;
    font-size:9px;
    font-weight:600;
    letter-spacing:1.8px;
    text-transform:uppercase;
    background:linear-gradient(100deg,
      #1d9bf0 0%,
      #1d9bf0 38%,
      #eaf5ff 50%,
      #1d9bf0 62%,
      #1d9bf0 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:transparent;
    animation:shine 3.2s linear infinite;
  }
  /* bloc texte sur 2 lignes (toutes les cartes) */
  .ctext{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    gap:2px;
    line-height:1.25;
    min-width:0;
  }
  .ctext .ctitle{
    font-size:14px;
    font-weight:500;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .ctext .csub{
    font-size:10px;
    letter-spacing:.3px;
    text-transform:capitalize;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    /* texte bleu en continu + vague de lumière qui le traverse */
    background:linear-gradient(100deg,
      #1d9bf0 0%,
      #1d9bf0 38%,
      #eaf5ff 50%,
      #1d9bf0 62%,
      #1d9bf0 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:transparent;
    animation:shine 3.2s linear infinite;
  }
  /* vague de lumière qui traverse le texte bleu, en boucle */
  @keyframes shine{
    from{ background-position:200% 0; }
    to{ background-position:-200% 0; }
  }
  /* les 4 rectangles */
  .links{
    width:100%;
    margin-top:4px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .card{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:14px 18px;
    border-radius:14px;
    background:transparent;
    border:1px solid rgba(255,255,255,.16);
    text-decoration:none;
    color:#fff;
    font-size:14px;
    font-weight:450;
    letter-spacing:.2px;
    transition:background .15s ease, border-color .15s ease, transform .15s ease;
  }
  .card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.28);transform:translateY(-1px)}
  .card .ic{width:24px;height:24px;flex:0 0 auto;display:inline-flex}
  .card .ic svg{width:100%;height:100%}
</style>
</head>

<script>
  // bloquer clic droit, glisser, sélection, et raccourcis de sauvegarde/inspection
  ['contextmenu','dragstart','selectstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
  });
  document.addEventListener('keydown', function(e){
    var k = (e.key||'').toLowerCase();
    if (k === 'f12') { e.preventDefault(); return; }
    if (e.ctrlKey && e.shiftKey && ['i','j','c'].indexOf(k) !== -1) { e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && ['s','u','p','a'].indexOf(k) !== -1) { e.preventDefault(); }
  });
</script>
