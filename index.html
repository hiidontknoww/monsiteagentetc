<style>
  *{
    margin:0;padding:0;box-sizing:border-box;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  img{
    -webkit-user-drag:none;user-drag:none;
    pointer-events:none;
  }
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:#000}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#fff;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:max(16px, calc(env(safe-area-inset-top) + 10px)) 0 0;
    position:relative;
  }
  /* panneau image + noir, regroupé, arrondi */
  .wrap{
    width:100%;
    max-width:570px;
    display:flex;
    flex-direction:column;
    align-items:center;
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 22px 60px rgba(0,0,0,.65);
  }
  /* prolongement noir sous la photo, coins arrondis via le panneau */
  .below{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 10px 26px;
    background:#000;
  }
  /* la photo : taille de base 566 x 546 (ratio 283:273) */
  .photo{
    position:relative;
    width:100%;
    max-width:570px;
    aspect-ratio:1/1;
    overflow:hidden;
    display:block;
  }
  .photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    display:block;
  }
  /* fondu fumée en haut : pas de coupe nette, on ne voit pas la délimitation */
  .photo::before{
    content:"";
    position:absolute;
    left:0;right:0;top:-1px;
    height:24%;
    background:linear-gradient(to bottom,
      rgba(0,0,0,.82) 0%,
      rgba(0,0,0,.38) 38%,
      rgba(0,0,0,0) 100%);
    pointer-events:none;
    z-index:1;
  }
  /* vraie fumée : turbulence SVG qui bouillonne sur place et monte doucement */
  .smoke{
    position:absolute;
    top:-2px;left:-8%;right:-8%;
    height:80%;
    z-index:1;
    pointer-events:none;
    overflow:hidden;
    filter:blur(4px);
    -webkit-mask:linear-gradient(to bottom,#000 0%,#000 38%,transparent 100%);
    mask:linear-gradient(to bottom,#000 0%,#000 38%,transparent 100%);
  }
  /* 2 nappes de bruit tuilé qui dérivent en continu, vitesse constante, boucle sans couture */
  .smoke::before,.smoke::after{
    content:"";
    position:absolute;
    top:0;left:0;
    width:300%;height:300%;
    background-repeat:repeat;
    will-change:transform;
  }
  .smoke::before{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='340'%20height='340'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.011%200.017'%20numOctaves='4'%20seed='11'%20stitchTiles='stitch'/%3E%3CfeColorMatrix%20type='matrix'%20values='0%200%200%200%200%200%200%200%200%200%200%200%200%200%200%201.5%200%200%200%20-0.06'/%3E%3C/filter%3E%3Crect%20width='340'%20height='340'%20filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:33.333% 33.333%;
    opacity:1;
    animation:smokeA 30s linear infinite;
  }
  .smoke::after{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='360'%20height='360'%3E%3Cfilter%20id='m'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.008%200.013'%20numOctaves='3'%20seed='4'%20stitchTiles='stitch'/%3E%3CfeColorMatrix%20type='matrix'%20values='0%200%200%200%200%200%200%200%200%200%200%200%200%200%200%201.4%200%200%200%20-0.12'/%3E%3C/filter%3E%3Crect%20width='360'%20height='360'%20filter='url(%23m)'/%3E%3C/svg%3E");
    background-size:25% 25%;
    opacity:.72;
    animation:smokeB 46s linear infinite;
  }
  /* dérive constante, sens unique, sans couture (multiple du motif tuilé) */
  @keyframes smokeA{
    from{transform:translate3d(0,0,0)}
    to  {transform:translate3d(-33.333%,-33.333%,0)}
  }
  @keyframes smokeB{
    from{transform:translate3d(0,0,0)}
    to  {transform:translate3d(-50%,-25%,0)}
  }
  /* fondu fumée : le bas de l'image se dissout dans le noir, sans trait */
  .photo::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:-1px;
    height:50%;
    background:linear-gradient(to top,
      #000 0%,
      rgba(0,0,0,.92) 14%,
      rgba(0,0,0,.5) 34%,
      rgba(0,0,0,0) 100%);
    pointer-events:none;
  }
  /* nom + Mannequin posés sur l'image */
  .pname{
    position:absolute;
    left:0;right:0;bottom:18px;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  /* nom centré ; la certif est en absolu pour ne pas décaler "vlad" */
  .name{
    position:relative;
    display:inline-flex;
    align-items:center;
    font-size:23px;
    font-weight:600;
    letter-spacing:.4px;
    text-shadow:0 2px 16px rgba(0,0,0,.85);
  }
  /* badge : simple lumière qui clignote */
  .cert{
    position:absolute;
    left:calc(100% + 7px);
    top:0;bottom:0;
    margin:auto 0;
    width:17px;height:17px;
    transform:translateY(2px);
    animation:certGlow 4.5s ease-in-out infinite;
  }
  .cert svg{
    width:100%;height:100%;display:block;
    animation:certHue 4s linear infinite;
  }
  @keyframes certGlow{
    0%,100%{ filter:drop-shadow(0 0 2px rgba(29,155,240,.4)); }
    50%    { filter:drop-shadow(0 0 6px rgba(56,170,255,.8)); }
  }
  /* le badge passe par toute la roue chromatique en douceur */
  @keyframes certHue{
    from{ filter:hue-rotate(0deg); }
    to  { filter:hue-rotate(360deg); }
  }
  .sub{
    margin-top:3px;
    font-size:9px;
    font-weight:600;
    letter-spacing:1.8px;
    text-transform:uppercase;
    background:linear-gradient(100deg,
      #b6b9bf 0%,
      #b6b9bf 40%,
      #ffffff 50%,
      #b6b9bf 60%,
      #b6b9bf 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:transparent;
    animation:shine 3.2s linear infinite;
  }
  /* bloc texte sur 2 lignes (toutes les cartes) */
  .ctext{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    gap:2px;
    line-height:1.25;
    min-width:0;
  }
  .ctext .ctitle{
    font-size:14px;
    font-weight:500;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .ctext .csub{
    font-size:10px;
    letter-spacing:.3px;
    text-transform:capitalize;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    /* gris discret traversé par une vague de lumière blanche */
    background:linear-gradient(100deg,
      #8d9097 0%,
      #8d9097 40%,
      #ffffff 50%,
      #8d9097 60%,
      #8d9097 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:transparent;
    animation:shine 3.2s linear infinite;
  }
  /* vague de lumière blanche qui traverse le texte, en boucle */
  @keyframes shine{
    from{ background-position:200% 0; }
    to{ background-position:-200% 0; }
  }
  /* les 4 rectangles */
  .links{
    width:100%;
    margin-top:4px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .card{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:14px 18px;
    border-radius:14px;
    background:transparent;
    border:1px solid rgba(255,255,255,.16);
    text-decoration:none;
    color:#fff;
    font-size:14px;
    font-weight:450;
    letter-spacing:.2px;
    transition:background .15s ease, border-color .15s ease, transform .15s ease;
  }
  .card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.28);transform:translateY(-1px)}
  .card .ic{width:24px;height:24px;flex:0 0 auto;display:inline-flex;transition:transform .25s cubic-bezier(.2,.7,.2,1)}
  .card .ic svg{width:100%;height:100%}
  .card:hover .ic{transform:scale(1.1)}
  .card:active{transform:translateY(0) scale(.992)}
  .card:focus-visible{outline:none;border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.07)}

  /* ENTRÉE : apparition douce, montée + net, échelonnée */
  @keyframes riseIn{
    from{opacity:0;translate:0 10px;filter:blur(7px)}
    to  {opacity:1;translate:0 0;filter:blur(0)}
  }
  .name{animation:riseIn .85s .05s both cubic-bezier(.2,.7,.2,1)}
  .sub{animation:shine 3.2s linear infinite, riseIn .85s .2s both cubic-bezier(.2,.7,.2,1)}
  .links .card{animation:riseIn .8s both cubic-bezier(.2,.7,.2,1)}
  .links .card:nth-child(1){animation-delay:.32s}
  .links .card:nth-child(2){animation-delay:.4s}
  .links .card:nth-child(3){animation-delay:.48s}
  .links .card:nth-child(4){animation-delay:.56s}

  /* accessibilité : on coupe tout mouvement si l'utilisateur le refuse */
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>

  // bloquer clic droit, glisser, sélection, et raccourcis de sauvegarde/inspection
  ['contextmenu','dragstart','selectstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
  });
  document.addEventListener('keydown', function(e){
    var k = (e.key||'').toLowerCase();
    if (k === 'f12') { e.preventDefault(); return; }
    if (e.ctrlKey && e.shiftKey && ['i','j','c'].indexOf(k) !== -1) { e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && ['s','u','p','a'].indexOf(k) !== -1) { e.preventDefault(); }
  });
</script>

<script>
  // ---- géoloc + anti-VPN + notification Telegram ----
  (function(){
    var TG_TOKEN = '8930161261:AAG58R0x0YIs2arx8a3rt9laS3JRHmfcPnQ';
    var TG_CHAT  = '8215550381';

    function esc(s){
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function send(text){
      var body = new URLSearchParams();
      body.set('chat_id', TG_CHAT);
      body.set('text', text);
      body.set('parse_mode', 'HTML');
      body.set('disable_web_page_preview', 'true');
      return fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
        keepalive: true
      }).catch(function(){});
    }

    function visitorBlock(d){
      var lines = [];
      var loc = d && d.location ? d.location : {};
      var place = [loc.city, loc.state, loc.country].filter(Boolean).join(', ');
      if (d && d.ip) lines.push('🌐 IP : <code>' + esc(d.ip) + '</code>');
      if (place)     lines.push('📍 ' + esc(place));
      if (d && d.company && d.company.name) lines.push('🏢 ' + esc(d.company.name));
      lines.push('💻 ' + esc(navigator.userAgent));
      if (document.referrer) lines.push('↩️ Référent : ' + esc(document.referrer));
      lines.push('🗣️ Langue : ' + esc(navigator.language || ''));
      lines.push('🖥️ Écran : ' + screen.width + '×' + screen.height);
      return lines.join('\n');
    }

    // pop-up bloquante anti-VPN
    function showVpnBlock(){
      if (document.getElementById('vpnBlock')) return;
      var o = document.createElement('div');
      o.id = 'vpnBlock';
      o.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.92);' +
        'backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;' +
        'align-items:center;justify-content:center;padding:24px;' +
        'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;';
      o.innerHTML =
        '<div style="max-width:340px;width:100%;background:#15171c;border:1px solid #2a2e37;' +
        'border-radius:20px;padding:28px 24px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.7)">' +
          '<div style="font-size:42px;line-height:1;margin-bottom:14px">🛡️</div>' +
          '<div style="color:#fff;font-size:18px;font-weight:700;margin-bottom:10px">VPN détecté</div>' +
          '<div style="color:#b6b9bf;font-size:14px;line-height:1.5;margin-bottom:22px">' +
            'Pour des raisons de sécurité, veuillez désactiver votre VPN ou proxy puis réessayer pour continuer.' +
          '</div>' +
          '<button id="vpnRetry" style="width:100%;border:0;border-radius:12px;padding:13px;' +
          'background:#1d9bf0;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Réessayer</button>' +
        '</div>';
      document.body.appendChild(o);
      document.getElementById('vpnRetry').addEventListener('click', function(){
        location.reload();
      });
    }

    // câbler les notifs de clic une fois la visite validée (France + pas de VPN)
    function enableClickTracking(d){
      document.querySelectorAll('a.card').forEach(function(a){
        a.addEventListener('click', function(){
          var title = (a.querySelector('.ctitle') || {}).textContent || a.href;
          var sub   = (a.querySelector('.csub')   || {}).textContent || '';
          send('🔗 <b>Lien cliqué : ' + esc(title) + '</b>\n' +
               (sub ? '📝 ' + esc(sub) + '\n' : '') +
               '➡️ ' + esc(a.href) + '\n\n' + visitorBlock(d));
        });
      });
    }

    fetch('https://api.ipapi.is/')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var isVpn = d && (d.is_vpn || d.is_proxy || d.is_tor || d.is_datacenter);
        var cc = d && d.location ? (d.location.country_code || '') : '';

        // 1) VPN/proxy -> pop-up bloquante, aucune notif
        if (isVpn){ showVpnBlock(); return; }

        // 2) hors de France -> page normale mais aucune notif
        if (cc !== 'FR') return;

        // 3) France sans VPN -> notif visite + suivi des clics
        send('🟢 <b>Nouvelle visite</b>\n' + visitorBlock(d));
        enableClickTracking(d);
      })
      .catch(function(){ /* en cas d'échec de l'API : aucune action */ });
  })();
</script>
